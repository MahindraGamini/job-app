services:

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - s-network
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jobapp
      SPRING_DATASOURCE_USERNAME: Mahindra
      SPRING_DATASOURCE_PASSWORD: 1234

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: Mahindra
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: jobapp
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql  # Changed from /var/lib/postgresql/data
    networks:
      - s-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Mahindra"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

networks:
  s-network:
    driver: bridge